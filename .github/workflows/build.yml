name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: xcodebuild -project SparkClean.xcodeproj -scheme SparkClean -configuration Release build

      - name: Build Status
        run: echo "Build succeeded"
